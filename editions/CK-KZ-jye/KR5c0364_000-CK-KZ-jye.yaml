body:
  text: 翰林學士承旨中大夫守尚書兵部侍郎知制誥上柱圖賜紫金魚袋樂朋龜撰原夫八十一天比太上之半壽六百萬歲當元始之初年道渺邈以難窮體希夷而莫究在無象無形之內居太初太易之前龍漢之劫再成鳳紀之文未立藏萌芽於浩素隱根榦於厖洪二神贔負以俱來鑿開造化三氣氤氲而互進樸散胚渾玄黃流而未凝淸濁分而乍結日月星辰之內化出靈宮川原山嶽之中變成洞府則知道爲萬氣之祖德爲百物之宗以二儀兩曜爲子孫以五行四象爲枝葉當其洪肇先啓紫極後成仰其高而彌高考其上而無上八公皓首當時之未有乾坤九老白眉厥後而初生天地探甚真之理臻大道之元列仙之境界延洪上士之齒齡逾遠以六千春爲兩月尚歎浮生以七萬歲爲二年仍嗟短景智者見之謂之智仁者見之謂之仁和光而眾曜皆慙挫銳而攢鍭盡碎玄珠匪纇眞璞無瑕學而知之者爲中生而知之者爲上三君五老睹兆人如醯鷄七聖九皇視百姓爲芻狗煦千古而冰釋成眾善而泉流至明若蒙蒙間而萬事俱照大巧若拙拙中而萬物皆成爲於不爲而於無用黜口爽於五味杜耳聰於八音忘象忘言易脫一時之屣無關無鍵難開眾妙之門九萬靈仙聚集於一毛之孔三千儒術荒蕪於獨角之端故知道儒二門經綸一揆立淸淨爲理體虛無爲師以上天爲大車之輪以列宿爲大車之輻駕之以乾馬之馬輓之以坤牛之牛般運無爲之功覆載自然之道光而不耀養正於蒙昧之中簡而能廉修眞於仄陋之內不可得而疎矣離之而匪遙不可得而親焉用之而逾遠不退而讓不進而求被褐懷玉之人美之又美罔象求珠之士斯焉取斯移世界而入壺中吞維摩方丈之室縮地形而藏術內掩悉達王舍之城有道之根修作立天之址無名之樸標爲鎮化之元三千威儀恭謹於文風之教五百戒行肅清於釋氏之門張天爲弓調之以陰陽寒暑直道如矢激之以春夏秋冬一夫用之而無餘兆人用之而不竭日窟月窟隱身而曾作穴居南溟北溟遁迹而聊遊水府桃源蓬島從古有而今存槐市杏壇見朝榮而暮落仙圖祕密五千載而三傳聖道靈長百萬年而一代容易而學之者似紐石以爲繩侮慢而求之者如鑽冰而待火絕巧棄利顯微闡幽坎離震兌之宮宮內而咸居羽客東西南北之斗斗中而皆住眞仙身駕德車輪轉於混茫之外手持壽柄指揮於開闢之前寂爾無營澹然自得化其不化則萬化而皆成生其不生則羣生而盡遂虛懷待物曠意承時藏泰山於秋毫之中秋毫仍大納崐崘於黍米之內黍米仍寬大象無形五岳空空而如也大信不約四時默默而行焉真宗之教皆成不宰之功益著太上金闕玄元天皇大帝則我巨唐之高祖按國語曰自周平王七載洎于泰至開元聖文神武皇帝即三十六代之聖孫赫赫日苗布蔭於普天之下明明國葉垂芳於率土之濱當其幽原既開九氣陶蒸而未已玄化大闡六虛流轉而勿休設不二之教門稽眞一之宗本浩風吹海三迴之重作飛塵劫火銷山五度之卻爲平地先逍遙於青運青運既周後出沒於赤明赤明復畢九十九萬億歲貯在彈丸五千五百重天藏於卵殻殷高宗御極之際周文王演易之初神光流入於瓊胎瑞彩結成其金骨不坼不副誕彌於八十餘齡降瑞降祥過期於二萬餘晝足蹈不滅之理手握長生之文包乾裹坤把日捉月額列參午頂荷圓穹耳開三門鼻立雙柱白血紫腦蒼肝青脾項引三十五光齒含四十八貝七色青蓮而隨步千年白鹿以呈休桑田變而雙檜不凋江河枯而九井不竭苦縣瀨鄕之里靈跡長存陳國渦泉之濱神蹤不泯七百弟子指扶桑爲故林九五帝君開日宮爲舊館詳其元始稽彼厥初俯窺溟涬之前下視渾淪之後隨機設教作九古之楷模應變無方爲百王之軌範若乃歲起攝提肇開氣象一十三聖之踐祚萬八千年之應圖我太上玄元聖祖應運降跡與天皇爲師上清下濁之初開相離未遠六合八紘之乍坼相去未遙正方圓上下之形定洪荒樸略之狀川新融而水仍晦山始結而石未堅種天上之白榆初生厯厯植月中之青桂乍出依依配四海於四神付五行於五帝是時乾象猶低坤形仍薄立極定位敷化建功我太上聖祖屑跡下降與地皇爲師分配剛柔制定寒暑地增博厚天益高明聖力難窮神功靡測萬木甲坼萬草勾萌羽族毛羣區別於兌離之位介蟲鱗類支分於坎震之宮四溟之水皆空未生魚鼈五嶽之形俱靜未吐雲霞已逾清海之年又離淸海之歲二聖既理四表生光我太上聖祖博施濟眾與人皇爲師三百六十之川初分血脈萬一千五百之策乍配偶奇三壬三乙之神離胎於水木六丙六辛之將出孕於火風一百五十六代四萬五千餘年始稱通玄天師再號金闕帝君三名盤古先生洎乎庖羲氏之王天下也我太上聖祖以道弘濟降跡爲師仰觀圓蓋之文俯察方輿之理教之以畫八卦指之以分三才助之以造書契之文製之以代結繩之政典墳自我而出經籍自我而生以畋以漁蓋取明離之象一索再索用乎出震之功鳳凰呈瑞於帝庭龍馬負圖於河洛享國一萬八千歲矣洎乎連山氏之王天下也我太上聖祖救時屈己下爲帝師付之以五運分之以四時助之以正萬機明之以辨百穀變飲血茹毛之化移蕢桴土鼓之音毁穴焚巢上棟下宇範金合土燔黍擘豚製耒耜以濟兆人作陶冶以利萬物天雨粟以呈瑞地芸稼而彰稔農食嘉穀山出器車洎乎有熊氏之王天下也我太上聖祖隱身於崆峒之中放心於杳冥之外帝乃親降輦輅禮展師資能摳衣以趨隅遂屈膝而問道當是時也榆岡凌虐蚩尤作亂化魚鼈爲兵士以助王師變雲霞爲神祇潛扶軍陣能弭兵於涿鹿致偃戈於阪泉東遊青丘之鄕北到洪隄之景受丹經於王屋登蒼冥於鼎湖屈軼既生蓂莢復出若非大道孰可致斯洎乎金天氏之王天下也承姬水之源襲熊山之錄告天類帝纘緒守文我太上聖祖乘九龍之輦降以爲師號太極先生說莊敬之典教之以順時迎氣昭配神明禋於六宗秩於羣望乾乾翼翼得禮之宜羽族呈休命之以鳥官爲理分布九鳸以統百司景合璧以表靈鳳銜圖而示貺悉由至道彰此帝謨逮至高陽氏之王天下也我太上聖祖教之以解紛塞兌治國安民滌蕩九黎陟明八凱有龍野紫髯之兇醜有蛇身赤髮之渠魁力拔不周首觸山碎天低西北致日月之西行地亞東南使江海而東注追呼六甲役御百靈訓之以微言之經教之以大順之道乘玄虬之迅駕或適幽陵御索螭以遐遊或臻蟠木觀吾仙㮏萬年而一度開花覩我靈瓜四劫而一迴結實及乎高辛氏之王天下也我太上聖祖敷道布化濟代爲師譚黃庭之妙言隱日遁月稱錄圖之嘉號返邑移城制九州之名作六英之樂封勾芒以佐蒼帝勑蓐收以翼白方封岱嶽而印金泥照寰區而開玉鏡飲大活之井遊不夜之鄉燔青鸞之膏充下仙之次饌擘黃騏之脯爲上客之珍羞逮至陶唐氏之王天下也我太上聖祖暫垂至理下降爲師講玄德之經道以匡於玄化應丹陵之瑞名冀列於丹丘和煦清風不作鳴條之響雍熙黃髮時聞擊壤之聲庖廚之肉脯自生胾餚失味山谷之醴泉潛湧麴糵無功達四聰以闢四門立五事而敷五教披鹿裘以食糲饌端拱於土階掛鶴氅而飲流霞凝思於瑤圃有虞氏之王天下也我太上聖祖譚無爲之理講離合之經三苗克悛四罪咸服百揆時序五典慎徽懷明神之珠賜昭華之玉眉與髮等表踐祚之嘉祥壽與天齊彰延齡之景福甄一十六相用二十五臣致百辟以協和如魚在水感兆人之歸湊如蟻慕膻化靈氣爲天書何勞筆力結卿雲爲寶殿不假人工夏后氏之王天下也我太上聖祖克匡王道爰作帝師譚德戒之經行爲國之法櫛沐風雨刊搓山林成九年理水之功爲四載勤王之業卑宮陋室盡力於溝洫之時襤服縷衣飾身於黼冕之禮導馬頰而奔流竹箭鑿龍門而迅激桃花救兆庶而皆免爲魚濟陸土而永非成海胸羅玉斗掛天文之在躬手展瑤圖懸國命之由己故知大道者三教之冠冕上德者百聖之宗元成湯氏之王天下也我太上聖祖權離左極下爲王師說長生之經體自然之道去三面之網開一目之羅獸遠逝而莫縈禽高翔而不罥引萬方而罪己數六事以責躬話之以八素七眞講之以六虛十訣千歲桃花之蜜味掩朱漿九垓薤葉之蔬滋霑紅露乘三光而電轉駕六氣以煙騰窺海瀆如涓涔視嵩衡如繭栗餐風飲露跨空攝虛以十洲爲少遊之宮以六極爲暫別之館驅傜中士役試下仙素髮一莖懸起萬斤之石綠筠數尺變成百丈之龍得之者七祖超昇失之者一身迷悞必在堅修慎習棄苦忘辛可以陶冶二儀埏埴九土青羊肆者按本紀則太上玄元大帝第二降生之所自殷道否閉周德凌夷陸海沸騰百川振動山鳴谷吼雨嘯風號厯藏史以同塵棄柱史而隱跡東離魏闕西度函關乘青牛宛轉之車駕白鳳逍遙之輦徐甲執御從仙帝以爰來尹喜占風知道君之必至暫別而三千甲子曾作赤童相逢而八百年齡永依黃老潛傳妙訣暗付微言重爲千日之期再結一時之會暫朝元始卻上天中之天永奉宗師重歸象外之象開寒靈之丹殿登眾寶之瓊臺坐紫金之牀凭碧琳之机太清仙伯仗星光錦文之旗大極仙公執月華命神之節皆拜首稽首以心觀心於是勑青帝之青童化羊於蜀國乘紫雲於紫府降瑞於王宮將停不嗄之聲須及來斯之乳俄聞喜至頓止嬰啼爰從赤子之身卻變白頭之士頃刻而身餘十尺須臾而面放五光頭建七曜玲瓏之冠肩垂九色離羅之帔衛士逾億從仙成群感十方之眾眞徧滿寥廓應八表之瑞氣充塞虛空香散九微之煙花飛六出之雪將離蜀土欲化胡風遠適流沙長移獷俗及身毒罽賓之國教煩陀阿柱之王恣剛强愎戾之心起烹焚鏨刺之意巨錡燃湯以沸地我則入之如涼泉積薪烈火以連天我則坐之如紺霧挾白挺者觀如蓬草持赤刃者視若鉛刀四天之兵眾俱來聲喧霆霹萬里之神祇共護力轉山河八十種之獯戎皆歸清化二千國之獷猂永革昏風俗既變矣道既成矣分身作佛濟如來千劫之功降跡爲師救王者萬機之務至若銅渾測運玉厯推禎天七五而一三及九乃滿地八六而二四到十乃盈變通陽九之災窮研百六之數雖宓羲軒昊之代無以免斯高辛唐虞之朝不能避此粤以廣明元祀歲在上章月當大蜡巨猾開釁於天邑渠魁俶擾於國步兵纏九野群臣咸議於省方蛇起陸風四嶽齊迎於巡狩長鯨呀口聞飲澧吐鎬之聲封豕横牙衝列刃攢鍭之隊牛虻未搏食吾黎庶之膏象蟻未除穴我樓臺之地塵蒙華蓋盜梗天衢九龍齊駕於雲輿玉輪西轉萬乘同迴於坤軸金闕南開涉水則波神捧舟登陸則地祇扈蹕太玄城內化出行宮濯錦江邊權安正殿執玉帛者數盈萬國列鴛鷺者位滿千官鷄林之群來朝鼇山解纜鶴拓之城入貢象駕來王當戎夷率服之辰成文軌混同之日苗人未格方資益贊之謀扈氏延誅正賴胤師之力熊韜豹韜之將俯立軍功龍角羊角之山可追聖瑞二十八化猶乘白鹿而來一百六災必跨蒼虬而救濳扶宗社幽贊子孫赤光照灼於庭臺太平顯兆紫氣晶熒於梅篠元吉尤彰稽彼變通明兹感應尋其靈跡果獲寶甎上有古篆文曰太上平中和災於是驗其六字表此百祥擊之卽聲類鳴璆觀之則狀如弘璧歷周秦漢魏之代玉篆仍新經晉宋梁隋之朝銀鉤不故藏諸韞匱祕甚緘縢克盛皇猷顯標青史歲代綿邈疆井變移舊址苔封古壇蕪沒仙鄕故里半落俗家眞境餘風惟殘瓦礫枯松夜月移聞玄鶴之聲暮草秋煙空聽莎鷄之響當時雲洞多隱狐狸昔日芝田盡生禾黍遐追靈跡顯驗休禎皇帝特下明詔剏造靈宮恩賜內外行庫錢二百萬爰徵班匠乃速厥功於是木神送材九層崇構地祇獻土百堵俱興水伯進泉以爲池山靈走石而作礎巍峨雲閣乍似化成岌嶪霞堂初疑涌出簷張羽翼棟壓虹蜺粉壁霜凝丹楹火亘牕籠倒景戸闢長霄塑像新成儀形乍降神情欲語似講五千之文意貌將行遠化十方之士金爐芬馥寶傘回旋乍覩出檻之羊猶疑跪乳初觀如練之馬尚慮嘶風庭剪蓬茅重生瑤草園除萱槿再吐瓊花岡阜崔嵬樓臺顯敞齊東溟圓嶠之殿抗西極化人之宮牽劍閣之靈威盡歸行在簇峨嵋之秀氣半入都城煙粘碧壇風引清磬故得五老下降四眞俱來畫地而成其江湖撮土而作其山嶽坐致風雨可以倒洛傾河立起雲煙可以反晝作夜化草木以成軍旅變士馬以成叢林如斯出師豈惟百勝如斯伐叛何啻七擒是以天災流行盡彼盈虛之理厯數倚伏稟其否泰之宜左慈呼召于神兵鞭笞羣盜許遜指揮于力士剪蕩狂妖所以陰騭兆人彌綸萬聖郯瞞丹水屢陳馘告之功牧野昆陽累獻遺俘之捷戈甲耀乎八水營壘塞乎四郊陣勢雲橫軍聲雷動血灑空而驟雨赤沙漲野而飄雲黃困獸摧牙長蛇畏尾郊鄾人之霄潰觀楚幕以盡空德均而義士致身氣直而王師難老度日而長鳴金鼓曾不告勞終年而不解鐵衣未嘗言苦既而鳳城光復龍德昭明枉矢當弦穿月之功奚用長竿在手撞天之勢何爲遂至修鯢脫泉狂兕入匣師道運末斷領於赤心之徒祿山數窮劈腹於蒼頭之輩況逆巢干紀悖氣凌空鳴螻蟈七八餘齡聚豺狼數十萬眾傷殘九土凌犯二京蓋因祝天網以緩誅布仁風而寬戮遂偷生之五載併除惡於一時蚩尤之塜既成堅埋鐵額長狄之喉已斷永戢雕戈立此神功實資道力我太上金闕玄元天皇太帝爲天地父母作帝王宗師歷教三皇皆萬八千歲侯乎四氣交會五運合同國位永付於子孫聖祚上齊於日月克紹萬八千之歲矣我高祖神堯皇帝應天受命厯數在躬以鄕觀鄕去仙鄕之無遠上德不德增帝德以彌高輟九赤之班符封山印海追八景之仙輅輾霧盤雲負扆垂旒當陽闡化我太宗文武皇帝握乾闡坤修文偃武大禮無體百禮而盡執根元大音希聲一聲而振動今古天賜勇智縶虎豹如束芻神助皇威跧蛟螭如結蚓還真返素遊藝依仁以無繩爲繩縳六雄與五霸以不器爲器籠四海與九州然後爭於不爭則戰爭而永息欲於不欲則嗜欲而長消方士眾臻眞公來格安期之棗異狀大若瓠瓜園客之繭殊形磊如盆盎垂衣一百五十代享國一萬八千年伏惟聖神聰睿仁哲明孝皇帝陛下克紹丕圖統兹大業心縣壽鏡身享福庭帝道中興國根深固永保神器長正皇綱虎牙將軍領八千之勇士龍頭元帥提百萬之精兵永以鎮定區中永以削平天下巨鼇斃而形軀塞海長鯨戮而鬐鬛插天或炙或焚盡千山之木以烹以飪竭五湖之泉紫焰腥膻青萍膏血祅日墮落孛星隕墜蒼旻開豁黑氣消亡獻巨逆之三顱告行朝之九廟耀武威於英代立京觀於神州歲越大椿年逾巨浸天睠北顧備法駕以返堯庭帝澤東流乘仙輿而懷魏闕集群牧以頒瑞朝諸侯於明堂摭逸搜沉興滅繼絕八龍雲篆降禹稷之天書二武聖文炳商周之帝德中階平而國泰至德正而時雍成寶祚之神功由太上之聖力端拱垂衣恭己正南面而已矣劍南西川節度使太尉兼中書令穎川郡王陳敬瑄夏日高懸吐赫曦之可畏德星永聚實祥瑞以明標遙闢龜城遠迎龍駕獻璿璣以酌大化如轉碧天移蓬萊以作行宮似離滄海郭琪扇搖於行伍阡能搔動於山林韓秀昇聚蚊爲雷陽師古積螢鬥日生擒者有同縛鼠誅戮者無異刲羊舞百獸於庭前堪標玉牒役五丁於麾下可碎鐵山雖文翁武侯之才蕭猷王濬之策未可與儔昔韋南康鎮成都二十餘載郭汾陽爲輔弼二紀在朝比其勳庸量其惠化則請留九閏之儲一裘之歲未爲多矣耀陳氏劍南之政掩裴度淮西之功具載典彝永光勳績行在都指揮使左神策軍中尉十軍軍容田令孜崑岡玉柱獨力扶天太華金蓮張心捧日佐聖而出爲國而生有逾千越萬之才有聞一知十之智曖然和氣助青帝發生之仁卓爾高情仰素王垂訓之道觀帝符而五賊皆見握人鏡而萬象難逃聰可聽其無聲明可察其未朕弼時立德開國成家賞罰無私九王之諸侯懷惠恩威普及十軍之將帥歸心克己推誠虔心奉道古原層構敬之而無異丹臺舊貫規繩仰之而如昇白日禮無上之帝主事威儀之法王神獸八千衝犀象如螻蟻天丁三億轉海嶽如萍蓬周尚父之功成身居第一漢酇侯之績著才獨無雙鏤鼎銘鍾紀勳頌德左僕射平章事蕭遘器業絕倫神秀貫古筆海壓淮湖之浪學山凌衡霍之峰天植國禎文滋相業一匡皇化八秉洪鈞函丈之間布奇兵之億萬跬步之內安率土之蒸黎黃鶴頻鳴雖召公之可控青牛不喘或邴吉以難知吏部尚書平章事韋昭度宗廟重器社稷令臣當昴位以星縣鎮台階而山立藴珪璋特達之德植松筠貞固之心窮訓典以立身正風正雅調鹽梅以味道肥國肥家仲父上公空就九三之位大林擣戭虛垂二八之名兵部尚書平章事裴澈澤馬表瑞天驥呈才雄節貫時清風滌俗銀漢橫空而高朗玉繩垂象之英華學川則四瀆波瀾書林則五松煙雨正氣凜於朝野直道貫於羊腸自輟職瀛洲登庸昭代重持傅說之舟檝再秉皋陶之鈞衡皆磨智刃而裁莽腰盡淬文鋒而刳卓腹內飛龍使楊復恭甲門華冑鼎族令名三教精通九流澄澈體物則左張卻立緣情則鮑謝推先論昆仲而八龍掀鬐譚經史而五鹿折角秉樞衡於累代貫名氏於百家稟呉季札之仙姿抱孔文子之敏惠青山藴玉發群岫以耀光淥水懷珠起一川之晶彩內樞密使開府儀同三司田胤禮四瀆比位五星炳靈清掩玉壺義輕金諾智圓若月長垂助日之光辯注如川每湊爲王之海秉氣正直執心温恭王佐宏才帝臣重器當軸而身迴地紀持樞而手正天文宿禀道門素欽眞教信言不美常行質奏之詞法語可尊每契和平之理內樞密使驃騎大將軍李順融三傑挺生千山發秀元禮龍門之峻慶及令孫少君鶴駕之高福滋靈葉掌萬機之密務濟一國之黎人公清而水鏡含虛正直而朱繩讓美博學則丘墳著績操觚則錦繡成文實腹守眞棄百慮於襟懷之外虛心待物納八荒於方寸之間監軍使驃騎大將軍兼三川制置都監劉景宣景宿呈祥卿雲布彩風骨俊邁才量宏深淮南王之瓊枝驂鸞不遠河上公之蘭友跨鶴非遙贊護克勤勳庸永著右街威儀明道大師尹嗣玄大仙靈苗高族茂葉太上玄元之上足文始眞君之哲孫七歲悟道十三逢師紫玉之骨將成終遊閬苑黃書之文已究即上朱陵道士李無爲國源清派天葉芳陰眞訣千重窮研咸達仙經萬卷諷覽無遺皆同在師門結爲道友三天鳳繭化靈氣以成書一粒龍丹駐童顏而度劫星冠月帔上禮於元皇虹轡雲輿前朝於大帝金蠶五斛暗吐仙絲瓊節一雙遙迎真侶自昔忠臣明主咸理國以昇天應曆運以救時蘇生靈而畢績少皞顓頊皆上紫微之宮君奭太公俱乘碧霞之輦其宮室牖戸臺榭池塘似雲霧之結成如丹青之寫出七十二之福地三十六之洞天神仙之窟宅相連以青城爲戸牖真景之風煙不雜以嶓冢爲壇臺可以濟度四迷開弘七部仙衣非製而自有豈假紉針仙車不駕而自行曾無轍跡九重天上白玉爲京千雉城中黃金作殿披衮服而身掛日月戴冕旒而坐鎮乾坤天綱正而四氣和國步安而三元序手執長生之柄制定白駒心藏要道之根控乘赤鯉況乎代變時遷綿歷於三千餘歲建邦立國崢嶸於四萬餘年門巷新成人煙漸熾當時闤闠髣髴如存今日宮庭精新尤盛七色鳳輦駕幸仍頻九斑龍輿巡禮彌敬太虛天館常開不夜之門無極福堂永對長春之景氣連碧落光掩赤城臣職忝禁林身叨詞客涉儒海而素淺渡文河而不深董仲舒五彩之蛟稀來筆下揚子雲三清之鷃少到毫端愧無黃絹之才難紀紫煙之瑞詞曰洪源肇開浩劫無際恍惚大道希夷象帝太初既隱太始來繼玄黄在殻清濁未蛻天地之前一千萬歲山比我久如電之逝海比我大如絲之細與釋比效空門永閉與儒並功章甫無勢昭德塞違解紛挫銳設教隨機應變無滯三皇益明五帝增睿率土皆泰群生咸濟樓觀發軔函關掛轊罽賓闡化申毒布惠無狀之狀無聲之聲去莫可送來莫可迎强字之字强名之名太虛之上黃金爲城杳冥之外白王作京煥赫六極牢籠八紘萬國同酌百谷咸傾莫得而竭莫得而盈淺而行者長居利貞深而行者永致太平凜凜烈氣化作天丁鬱鬱勁草變爲神兵火刀電耀霜劍虹明莧戮封豕瓜剖長鯨地古風變俗阜時清年代綿邈歲月崢嶸新宮是建永觀厥成赫赫高祖明明聖孫開鑿造化刳剔胚渾把捉日月包裹乾坤鸞蹌鳳跱虎步龍蹲鳥卵之中可納穹旻黍粒之內能藏崐崘塵波澄澈智浪淵淪迷羅自解瑩鏡難昏萬象俱盡惟道獨存三教爭長惟道獨尊心藏五賊國靜九門蓬蓬諫鼓汎汎衢罇五方入貢八表爭奔車徒川霧租賦雲屯巍峨玉皇煥赫金籙靈官八海水府四瀆堯湯寶位舜禹天祿巨寇梟殄神州克復去召千神來臻百福天轉碧輪地旋黃轂獻玉十珏貢金九牧寒暑運行禎祥倚伏害蛟斃刃狂兕殪鏃軒鏡在握殷繩當木瓊臺九層銀蠶五斛手指青牛身騎白鹿洞啓括蒼天開王屋皇根國葉帝宗天族明堂端拱元臣啓沃四海萬方無思不服九虬夭矯雙鳳迴旋鶴駕清漢鸞驂紫煙累行盈百積功滿千丹瓊樓高上接九天碧玉壇峻下降八仙大臥蓬島龍耕芝田地有謙道東走眾川人居上德南御羣賢大活之井長生之泉延洪聖祚萬八千年鶴涅不緇烏非染黑然於自然得於自得何以發蒙內辨其惑何以開悟中修其式如車指南似星拱北隱見無常變化不測大象難包二儀益塞大智難展六合陋仄長生之柄永壽之域朝服刀圭暮生羽翼廟獻三顱風清萬國靈觀親構羣仙來格瓊宮寶臺玉書金策豐碑嶽立巨龜鼇逼詞惟頌美文匪誕飾鸞鶴翹蹲龍蛇騰躑紫氣氤氲赤光歙赩七聖握圖九皇執勑梵宇增光儒宮出色端冕明堂垂旒御極運齊三五慶延萬億開闢寰區咸仰道德永致中興皆從帝力臣奉宣令撰青羊宮碑銘伏以太上金闕玄元皇帝大道之祖宗上德之根本先天地而出後天地而存遨遊於五劫之中經厯乎一千萬歲古青羊肆白鹿神蹤紫氣氤氲赤光照灼靈甎玉篆永表中興九萬群仙皆在指揮之下三億力士咸居役使之間故能運動乾坤轉移海嶽化魚鼈爲兵士剪戮銅頭變軍旅爲叢林埋藏鐵騎濳扶聖運冥助王師殄滅渠魁廓清宇宙懸三兇之首級獻九廟之威靈克盛帝圖永平國步臣跪承睿旨仰奉皇慈昧學謏聞屬詞荒鄙其碑文今已撰訖謹隨狀奉進以聞者右翰林學士守尚書兵部侍郎樂朋龜奏謹具如前中書門下牒西川節度使牒奉勅金闕降祥紫氣接度關之狀瑤壇閟瑞赤光騰發地之文粤有玄符留于古篆當午夜而龍蛇搖動六字分輝後一年而狼武蕩平八紘無事克昭靈貺獲啓中興考帝祖之微言顯神功於景運得不標於道觀銘在蜀川流傳千百萬年紀我一十八葉樂朋龜職司內翰首冠近臣妙迴擲地之金鏤入他山之石鋪陳盡善蔡邕當患於先知述作無遺子建何勞於獨見宜刊盛事以證斯文宜令西川節度使於本觀建立牒至准勅故牒中和四年九月八日牒西川青羊宮碑銘
